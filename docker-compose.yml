version: '3.8'

services:
  notifier:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: notifier
    command: /app/notifier
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - TELEGRAM_API_TOKEN=${TELEGRAM_API_TOKEN}
      - TELEGRAM_UPDATE_CONFIG_TIMEOUT=${TELEGRAM_UPDATE_CONFIG_TIMEOUT}
      - TELEGRAM_DEBUG=${TELEGRAM_DEBUG}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}
      - CHROME_WS_URL=${CHROME_WS_URL}
      - CHROME_TIMEOUT=${CHROME_TIMEOUT}
    depends_on:
      - db
      - chrome
    networks:
      - internal

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: scraper
    command: /app/scraper
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - SCRAPER_INTERVAL=${SCRAPER_INTERVAL}
      - PAGE_LIMIT=${PAGE_LIMIT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}
      - CHROME_WS_URL=${CHROME_WS_URL}
      - CHROME_TIMEOUT=${CHROME_TIMEOUT}
    depends_on:
      - db
      - chrome
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: worker
    command: /app/worker
    restart: always
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - WORKER_NOTIFICATION_INTERVAL=${WORKER_NOTIFICATION_INTERVAL}
      - TELEGRAM_API_TOKEN=${TELEGRAM_API_TOKEN}
      - TELEGRAM_UPDATE_CONFIG_TIMEOUT=${TELEGRAM_UPDATE_CONFIG_TIMEOUT}
      - TELEGRAM_DEBUG=${TELEGRAM_DEBUG}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}
    depends_on:
      - db
    networks:
      - internal

  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - internal
    ports:
      - "5432:5432"

  chrome:
    image: zenika/alpine-chrome:latest
    restart: always
    ports:
      - "9222:9222"
    command: [ chromium-browser, "--headless", "--disable-gpu", "--no-sandbox", "--remote-debugging-address=0.0.0.0", "--remote-debugging-port=9222" ]
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
